<p style="margin:0 0 16px;">你好，</p>
<p style="margin:0 0 16px;">{{appName}} 发布了一条新的系统公告，请关注以下内容。</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%;margin:18px 0;border-collapse:separate;border-spacing:0;border:1px solid #dbeafe;border-radius:10px;background:#f8fbff;overflow:hidden;">
  <tr>
    <td style="padding:16px 18px;border-bottom:1px solid #e0ecff;">
      <div style="font-size:13px;line-height:1.5;color:#1d4ed8;font-weight:700;">{{levelText}}</div>
      <div style="margin-top:4px;font-size:22px;line-height:1.35;color:#0f172a;font-weight:800;">{{announcementTitle}}</div>
    </td>
  </tr>
  <tr>
    <td style="padding:16px 18px;">
      <div style="font-size:14px;line-height:1.9;color:#334155;">{{announcementContent}}</div>
    </td>
  </tr>
</table>

<p style="margin:0 0 16px;color:#475569;">生效时间：{{startTime}}<br>失效时间：{{endTime}}</p>

<p style="margin:20px 0;">
  <a href="{{consoleUrl}}" style="display:inline-block;padding:10px 16px;border-radius:8px;background:#2563eb;color:#ffffff;text-decoration:none;font-size:14px;font-weight:700;">进入控制台</a>
</p>

<p style="margin:0;color:#64748b;font-size:13px;line-height:1.8;">通知时间：{{time}}</p>
